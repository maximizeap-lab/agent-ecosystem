name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # SKIP DRAFT PRs
  # ─────────────────────────────────────────────
  skip-draft:
    name: Skip Draft PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - run: echo "PR is ready for review — proceeding with checks"

  # ─────────────────────────────────────────────
  # ENFORCE PR TITLE (Conventional Commits)
  # ─────────────────────────────────────────────
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    needs: skip-draft
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: "^(?![A-Z]).+$"
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            doesn't start with an uppercase character.

  # ─────────────────────────────────────────────
  # LABEL BASED ON FILES CHANGED
  # ─────────────────────────────────────────────
  labeler:
    name: Auto Label
    runs-on: ubuntu-latest
    needs: skip-draft
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml

  # ─────────────────────────────────────────────
  # BUNDLE SIZE ANALYSIS
  # ─────────────────────────────────────────────
  bundle-size:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: skip-draft
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (PR branch)
        run: pnpm build
        env:
          VITE_API_BASE_URL: https://api.example.com

      - name: Measure bundle sizes
        run: |
          du -sh dist/assets/*.js > bundle-sizes-pr.txt
          du -sh dist/assets/*.css >> bundle-sizes-pr.txt
          cat bundle-sizes-pr.txt

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-pr-${{ github.event.pull_request.number }}
          path: |
            dist/
            bundle-sizes-pr.txt
            stats.html

      - name: Analyze bundle with bundlewatch
        uses: jackvdl/bundlewatch-action@main
        env:
          BUNDLEWATCH_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_REPO_OWNER: ${{ github.repository_owner }}
          CI_REPO_NAME: ${{ github.event.repository.name }}
          CI_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          CI_BRANCH: ${{ github.head_ref }}
          CI_BRANCH_BASE: ${{ github.base_ref }}

  # ─────────────────────────────────────────────
  # VISUAL REGRESSION (Storybook / Chromatic)
  # ─────────────────────────────────────────────
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: skip-draft
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook
          onlyChanged: true
          exitZeroOnChanges: true

  # ─────────────────────────────────────────────
  # ACCESSIBILITY TESTS
  # ─────────────────────────────────────────────
  accessibility:
    name: Accessibility (axe-core)
    runs-on: ubuntu-latest
    needs: skip-draft
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm playwright install --with-deps chromium

      - name: Build app
        run: pnpm build
        env:
          VITE_API_BASE_URL: https://api.example.com

      - name: Run axe accessibility tests
        run: pnpm test:a11y

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report-${{ github.event.pull_request.number }}
          path: reports/a11y/

  # ─────────────────────────────────────────────
  # DEPENDENCY REVIEW
  # ─────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: skip-draft
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ─────────────────────────────────────────────
  # OVERALL STATUS GATE
  # ─────────────────────────────────────────────
  pr-status:
    name: All PR Checks Passed
    runs-on: ubuntu-latest
    needs:
      - pr-title
      - bundle-size
      - visual-regression
      - accessibility
      - dependency-review
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ One or more PR checks failed"
            exit 1
          fi
          echo "✅ All PR checks passed"
