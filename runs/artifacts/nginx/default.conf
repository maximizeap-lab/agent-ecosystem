server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.example.com;"
        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Health endpoint for k8s probes
    location /health {
        access_log  off;
        return 200 '{"status":"healthy","service":"dashboard-app"}';
        add_header  Content-Type application/json;
    }

    # Hashed assets — cache forever
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # index.html — no cache (SPA entry point)
    location = /index.html {
        expires     -1;
        add_header  Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # All other routes → SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        expires   -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page  404              /index.html;
    error_page  500 502 503 504  /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
