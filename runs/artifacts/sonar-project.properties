# SonarCloud project configuration
sonar.projectKey=your-org_dashboard-app
sonar.organization=your-org
sonar.projectName=Dashboard App
sonar.projectVersion=1.0

# Source
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.stories.*

# Language
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=reports/junit/*.xml

# Quality Gate thresholds
sonar.coverage.exclusions=**/*.stories.*,src/main.tsx,src/vite-env.d.ts

# Encoding
sonar.sourceEncoding=UTF-8
