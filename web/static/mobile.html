<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MAP HQ" />
  <meta name="theme-color" content="#0d0d0f" />
  <link rel="manifest" href="/manifest.json" />
  <title>MAP HQ</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161e;
      --border: #2a2a3a;
      --text: #e8eaf0;
      --muted: #7c7f8e;
      --blue: #4f8ef7;
      --blue-dark: #3a6fd4;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --purple: #a78bfa;
      --bubble-me: #2563eb;
      --bubble-ai: #1e1e2e;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 16px;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 12px) 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -0.3px;
    }
    .header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .status-dot.offline { background: var(--red); }
    .header-action {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* ── Screens ── */
    .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .screen.active { display: flex; }

    /* ── Login screen ── */
    #screen-login {
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      gap: 24px;
    }
    .login-logo { font-size: 3rem; }
    .login-title { font-size: 1.5rem; font-weight: 700; color: var(--blue); }
    .login-sub { color: var(--muted); font-size: 0.9rem; text-align: center; line-height: 1.5; }
    .login-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      text-align: center;
      letter-spacing: 1px;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .login-btn:active { opacity: 0.85; }

    /* ── Chat screen ── */
    #screen-chat { position: relative; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }
    .bubble-wrap.me { align-self: flex-end; align-items: flex-end; }
    .bubble-wrap.ai { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.me {
      background: var(--bubble-me);
      color: white;
      border-bottom-right-radius: 5px;
    }
    .bubble.ai {
      background: var(--bubble-ai);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }
    .bubble-time {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
      padding: 0 4px;
    }
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 15px;
      background: var(--bubble-ai);
      border: 1px solid var(--border);
      border-radius: 20px;
      border-bottom-left-radius: 5px;
      align-items: center;
      width: fit-content;
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    .chat-input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 12px calc(var(--safe-bottom) + 10px);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 16px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.4;
      font-family: inherit;
    }
    .chat-input:focus { border-color: var(--blue); }
    .chat-send {
      background: var(--blue);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: white;
      font-size: 1.1rem;
    }
    .chat-send:disabled { opacity: 0.4; }
    .chat-send:active:not(:disabled) { transform: scale(0.92); }
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      padding: 40px;
    }
    .chat-empty-icon { font-size: 2.5rem; }
    .chat-empty-text { font-size: 0.9rem; text-align: center; line-height: 1.6; }

    /* ── Run screen ── */
    #screen-run { padding: 20px 16px; gap: 16px; }
    .run-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .run-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 14px 16px;
      resize: none;
      min-height: 100px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }
    .run-textarea:focus { border-color: var(--blue); }
    .run-btn {
      width: 100%;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .run-btn:disabled { opacity: 0.4; }
    .run-btn:active:not(:disabled) { opacity: 0.85; }
    .run-progress {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.6;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }
    .run-progress.visible { display: block; }
    .prog-line { margin-bottom: 4px; }
    .prog-orchestrator { color: var(--purple); }
    .prog-worker { color: #60a5fa; }
    .prog-success { color: var(--green); }
    .prog-error { color: var(--red); }
    .prog-warning { color: var(--yellow); }
    .run-result {
      background: var(--surface);
      border: 1px solid var(--blue);
      border-radius: 14px;
      padding: 16px;
      font-size: 0.88rem;
      line-height: 1.7;
      white-space: pre-wrap;
      display: none;
      overflow-y: auto;
      max-height: 300px;
    }
    .run-result.visible { display: block; }
    .run-result-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* Approval bottom sheet */
    #approval-sheet {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
    }
    #approval-sheet.visible { display: flex; }
    .sheet-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(var(--safe-bottom) + 20px);
      width: 100%;
      max-height: 75vh;
      overflow-y: auto;
    }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .sheet-title { font-size: 0.95rem; font-weight: 700; color: var(--yellow); margin-bottom: 4px; }
    .sheet-goal { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
    .sheet-tasks { list-style: none; margin-bottom: 16px; }
    .sheet-tasks li {
      background: var(--bg);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 0.83rem;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .sheet-actions { display: flex; gap: 10px; }
    .sheet-accept {
      flex: 1; background: #166534; color: white;
      border: none; border-radius: 12px; padding: 13px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .sheet-cancel {
      flex: 1; background: #7f1d1d; color: white;
      border: none; border-radius: 12px; padding: 13px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }

    /* ── History screen ── */
    #screen-history { overflow-y: auto; padding: 12px 16px; gap: 10px; -webkit-overflow-scrolling: touch; }
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
    }
    .history-card:active { opacity: 0.75; }
    .history-goal {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .history-meta {
      display: flex;
      gap: 10px;
      font-size: 0.72rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .history-cost { color: var(--green); }
    .history-summary {
      display: none;
      margin-top: 12px;
      font-size: 0.83rem;
      line-height: 1.6;
      color: var(--muted);
      white-space: pre-wrap;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .history-summary.open { display: block; }
    .history-empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.9rem; }

    /* ── Status screen ── */
    #screen-status { overflow-y: auto; padding: 16px; gap: 12px; -webkit-overflow-scrolling: touch; }
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .status-card h3 { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .status-val { font-size: 1.6rem; font-weight: 700; }
    .ok { color: var(--green); }
    .err { color: var(--red); }
    .warn { color: var(--yellow); }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .token-section { display: flex; flex-direction: column; gap: 10px; }
    .token-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 12px 14px;
      outline: none;
      font-family: monospace;
      letter-spacing: 0.5px;
    }
    .token-input:focus { border-color: var(--blue); }
    .token-save {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
    .token-save:active { opacity: 0.85; }
    .token-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--red);
      border-radius: 10px;
      padding: 12px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 0.85rem; color: var(--muted); }
    .stat-value { font-size: 0.9rem; font-weight: 600; color: var(--text); }

    /* ── Bottom tab bar ── */
    .tab-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 calc(var(--safe-bottom) + 8px);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 4px;
      min-height: 50px;
    }
    .tab-icon { font-size: 1.3rem; line-height: 1; }
    .tab-label { font-size: 0.65rem; color: var(--muted); font-weight: 500; }
    .tab-btn.active .tab-icon { filter: drop-shadow(0 0 6px var(--blue)); }
    .tab-btn.active .tab-label { color: var(--blue); }
    .tab-btn:active { opacity: 0.7; }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="screen-login" class="screen active" style="display:flex">
  <div class="login-logo">⚡</div>
  <div class="login-title">MAP HQ</div>
  <div class="login-sub">Enter your access token to continue</div>
  <input class="login-input" id="login-token" type="password" placeholder="maphq_..."
         autocomplete="current-password" autocorrect="off" autocapitalize="none" />
  <button class="login-btn" onclick="doLogin()">Sign In</button>
</div>

<!-- Header (hidden on login) -->
<div class="header" id="app-header" style="display:none">
  <div class="header-title">⚡ MAP HQ</div>
  <div class="header-status">
    <div class="status-dot" id="hdr-dot"></div>
    <span id="hdr-label">connecting…</span>
  </div>
  <button class="header-action" id="hdr-action" onclick="headerAction()">New</button>
</div>

<!-- Chat screen -->
<div id="screen-chat" class="screen">
  <div id="chat-empty" class="chat-empty">
    <div class="chat-empty-icon">💬</div>
    <div class="chat-empty-text">Ask me anything.<br>I know about MAP HQ and your runs.</div>
  </div>
  <div id="chat-messages" class="chat-messages" style="display:none"></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" placeholder="Message…" rows="1"
              onkeydown="chatKeydown(event)" oninput="autoResize(this)"></textarea>
    <button class="chat-send" id="chat-send" onclick="sendChat()">↑</button>
  </div>
</div>

<!-- Run screen -->
<div id="screen-run" class="screen">
  <div class="run-label">Goal</div>
  <textarea class="run-textarea" id="run-input"
            placeholder="What do you want MAP HQ to build or research?"></textarea>
  <button class="run-btn" id="run-btn" onclick="submitGoal()">▶ Run with MAP HQ</button>
  <div class="run-progress" id="run-progress"></div>
  <div class="run-result" id="run-result">
    <div class="run-result-label">✓ Result</div>
    <div id="run-result-text"></div>
  </div>
</div>

<!-- History screen -->
<div id="screen-history" class="screen">
  <div id="history-list"></div>
</div>

<!-- Status screen -->
<div id="screen-status" class="screen">
  <div class="status-grid">
    <div class="status-card">
      <h3>Claude API</h3>
      <div class="status-val" id="s-api">…</div>
    </div>
    <div class="status-card">
      <h3>Ollama</h3>
      <div class="status-val" id="s-ollama">…</div>
    </div>
  </div>
  <div class="status-card">
    <h3>Analytics</h3>
    <div id="s-analytics">
      <div class="stat-row"><span class="stat-label">Total Runs</span><span class="stat-value" id="s-runs">–</span></div>
      <div class="stat-row"><span class="stat-label">Total Cost</span><span class="stat-value" id="s-cost">–</span></div>
      <div class="stat-row"><span class="stat-label">Avg Duration</span><span class="stat-value" id="s-dur">–</span></div>
    </div>
  </div>
  <div class="status-card">
    <h3>Access Token</h3>
    <div class="token-section">
      <input class="token-input" id="token-input" type="password" placeholder="maphq_..."
             autocomplete="off" autocorrect="off" autocapitalize="none" />
      <button class="token-save" onclick="saveToken()">Save Token</button>
      <button class="token-clear" onclick="clearToken()">Sign Out</button>
    </div>
  </div>
</div>

<!-- Tab bar (hidden on login) -->
<nav class="tab-bar" id="tab-bar" style="display:none">
  <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')">
    <span class="tab-icon">💬</span>
    <span class="tab-label">Chat</span>
  </button>
  <button class="tab-btn" id="tab-run" onclick="switchTab('run')">
    <span class="tab-icon">⚡</span>
    <span class="tab-label">Run</span>
  </button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">
    <span class="tab-icon">📋</span>
    <span class="tab-label">History</span>
  </button>
  <button class="tab-btn" id="tab-status" onclick="switchTab('status')">
    <span class="tab-icon">⚙️</span>
    <span class="tab-label">Settings</span>
  </button>
</nav>

<!-- Plan approval bottom sheet -->
<div id="approval-sheet">
  <div class="sheet-box">
    <div class="sheet-handle"></div>
    <div class="sheet-title">⏸ Review Plan</div>
    <div class="sheet-goal" id="sheet-goal"></div>
    <ul class="sheet-tasks" id="sheet-tasks"></ul>
    <div class="sheet-actions">
      <button class="sheet-accept" onclick="submitApproval(true)">✓ Approve</button>
      <button class="sheet-cancel" onclick="submitApproval(false)">✗ Cancel</button>
    </div>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────────
  let TOKEN = localStorage.getItem('maphq_token') || '';
  let chatId = localStorage.getItem('maphq_chat_id') || null;
  let currentTab = 'chat';
  let chatStreaming = false;
  let runApprovalRunId = null;
  let currentRunId = null;
  let currentRunSource = null;

  // ── Auth ──────────────────────────────────────────────────────────────────────
  function doLogin() {
    const t = document.getElementById('login-token').value.trim();
    if (!t) return;
    TOKEN = t;
    localStorage.setItem('maphq_token', t);
    showApp();
  }

  function showApp() {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('app-header').style.display = 'flex';
    document.getElementById('tab-bar').style.display = 'flex';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    switchTab('chat');
    loadStatus();
    setInterval(loadStatus, 30000);
  }

  function clearToken() {
    TOKEN = '';
    chatId = null;
    localStorage.removeItem('maphq_token');
    localStorage.removeItem('maphq_chat_id');
    location.reload();
  }

  function saveToken() {
    const t = document.getElementById('token-input').value.trim();
    if (!t) return;
    TOKEN = t;
    localStorage.setItem('maphq_token', t);
    document.getElementById('token-input').value = '';
    alert('Token saved.');
  }

  // On load — auto-login if token saved
  if (TOKEN) showApp();

  // ── Tab switching ──────────────────────────────────────────────────────────────
  function switchTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('screen-' + name).classList.add('active');

    const hdrAction = document.getElementById('hdr-action');
    if (name === 'chat') {
      hdrAction.textContent = 'New';
      hdrAction.style.display = '';
    } else if (name === 'run') {
      hdrAction.style.display = 'none';
    } else if (name === 'history') {
      hdrAction.style.display = 'none';
      loadHistory();
    } else if (name === 'status') {
      hdrAction.style.display = 'none';
      loadStatus();
      loadAnalytics();
      document.getElementById('token-input').value = TOKEN;
    }
  }

  function headerAction() {
    if (currentTab === 'chat') newChat();
  }

  // ── Status ────────────────────────────────────────────────────────────────────
  async function loadStatus() {
    try {
      const s = await api('/status');
      const dot = document.getElementById('hdr-dot');
      const lbl = document.getElementById('hdr-label');
      if (s.api === 'ok') {
        dot.className = 'status-dot';
        lbl.textContent = s.ollama === 'ok' ? 'API + Ollama' : 'API only';
      } else {
        dot.className = 'status-dot offline';
        lbl.textContent = 'API offline';
      }
      const apiEl = document.getElementById('s-api');
      const ollamaEl = document.getElementById('s-ollama');
      if (apiEl) {
        apiEl.textContent = s.api === 'ok' ? 'OK' : 'ERROR';
        apiEl.className = 'status-val ' + (s.api === 'ok' ? 'ok' : 'err');
        ollamaEl.textContent = s.ollama === 'ok' ? 'OK' : 'OFFLINE';
        ollamaEl.className = 'status-val ' + (s.ollama === 'ok' ? 'ok' : 'warn');
      }
    } catch(e) {}
  }

  async function loadAnalytics() {
    try {
      const a = await api('/analytics');
      document.getElementById('s-runs').textContent = a.total_runs;
      document.getElementById('s-cost').textContent = '$' + (a.total_cost_usd || 0).toFixed(4);
      document.getElementById('s-dur').textContent = a.avg_duration_seconds + 's';
    } catch(e) {}
  }

  // ── History ───────────────────────────────────────────────────────────────────
  async function loadHistory() {
    const el = document.getElementById('history-list');
    el.innerHTML = '<div class="history-empty">Loading…</div>';
    try {
      const runs = await api('/runs');
      if (!runs.length) {
        el.innerHTML = '<div class="history-empty">No runs yet.<br>Go to Run tab to start.</div>';
        return;
      }
      el.innerHTML = runs.map(r => `
        <div class="history-card" onclick="toggleHistory(this, ${r.id})">
          <div class="history-goal">${esc(r.goal)}</div>
          <div class="history-meta">
            <span>${new Date(r.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
            ${r.total_cost_usd ? `<span class="history-cost">$${r.total_cost_usd.toFixed(4)}</span>` : ''}
            ${r.duration_seconds ? `<span>${r.duration_seconds}s</span>` : ''}
          </div>
          <div class="history-summary" id="hs-${r.id}"></div>
        </div>
      `).join('');
    } catch(e) {
      el.innerHTML = '<div class="history-empty">Failed to load history.</div>';
    }
  }

  async function toggleHistory(card, id) {
    const el = document.getElementById('hs-' + id);
    if (el.classList.contains('open')) {
      el.classList.remove('open');
      return;
    }
    if (!el.textContent) {
      el.textContent = 'Loading…';
      try {
        const run = await api('/runs/' + id);
        el.textContent = run.summary || 'No summary available.';
      } catch(e) {
        el.textContent = 'Failed to load.';
      }
    }
    el.classList.add('open');
  }

  // ── Chat ──────────────────────────────────────────────────────────────────────
  function newChat() {
    chatId = null;
    localStorage.removeItem('maphq_chat_id');
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('chat-messages').style.display = 'none';
    document.getElementById('chat-empty').style.display = 'flex';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function chatKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  }

  async function sendChat() {
    if (chatStreaming) return;
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    input.style.height = 'auto';

    // Show messages panel
    document.getElementById('chat-empty').style.display = 'none';
    const messagesEl = document.getElementById('chat-messages');
    messagesEl.style.display = 'flex';

    // Add user bubble
    addBubble(messagesEl, 'me', msg);

    // Add typing indicator
    const typing = document.createElement('div');
    typing.className = 'bubble-wrap ai';
    typing.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    messagesEl.appendChild(typing);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    chatStreaming = true;
    document.getElementById('chat-send').disabled = true;

    try {
      const res = await api('/chat', 'POST', { message: msg, chat_id: chatId });
      chatId = res.chat_id;
      localStorage.setItem('maphq_chat_id', chatId);

      // Replace typing with streaming bubble
      messagesEl.removeChild(typing);
      const aiBubbleWrap = document.createElement('div');
      aiBubbleWrap.className = 'bubble-wrap ai';
      const aiBubble = document.createElement('div');
      aiBubble.className = 'bubble ai';
      aiBubbleWrap.appendChild(aiBubble);
      messagesEl.appendChild(aiBubbleWrap);

      // Stream response
      const source = new EventSource(`/chat/stream/${chatId}?token=${encodeURIComponent(TOKEN)}`);
      source.addEventListener('chunk', e => {
        aiBubble.textContent += JSON.parse(e.data);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
      source.addEventListener('done', () => {
        source.close();
        const time = document.createElement('div');
        time.className = 'bubble-time';
        time.textContent = now();
        aiBubbleWrap.appendChild(time);
        chatStreaming = false;
        document.getElementById('chat-send').disabled = false;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
      source.addEventListener('error', e => {
        source.close();
        aiBubble.textContent = '⚠️ Error — please try again.';
        chatStreaming = false;
        document.getElementById('chat-send').disabled = false;
      });
    } catch(e) {
      messagesEl.removeChild(typing);
      addBubble(messagesEl, 'ai', '⚠️ Could not connect. Check your token in Settings.');
      chatStreaming = false;
      document.getElementById('chat-send').disabled = false;
    }
  }

  function addBubble(container, who, text) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ' + who;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + who;
    bubble.textContent = text;
    const time = document.createElement('div');
    time.className = 'bubble-time';
    time.textContent = now();
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  // ── MAP HQ Run ────────────────────────────────────────────────────────────────
  async function submitGoal() {
    const goal = document.getElementById('run-input').value.trim();
    if (!goal) return;

    const btn = document.getElementById('run-btn');
    const progress = document.getElementById('run-progress');
    const result = document.getElementById('run-result');
    const resultText = document.getElementById('run-result-text');

    btn.disabled = true;
    progress.innerHTML = '';
    progress.classList.add('visible');
    result.classList.remove('visible');
    addProgress(progress, 'start', '🚀 Starting…');

    if (currentRunSource) { currentRunSource.close(); }

    try {
      const res = await api('/run', 'POST', { goal });
      currentRunId = res.run_id;

      currentRunSource = new EventSource(`/stream/${currentRunId}`);

      ['orchestrator','worker','success','error','warning','info'].forEach(ev => {
        currentRunSource.addEventListener(ev, e => {
          addProgress(progress, ev, JSON.parse(e.data));
        });
      });

      let synthText = '';
      currentRunSource.addEventListener('synthesis', e => {
        synthText += JSON.parse(e.data);
        resultText.textContent = synthText;
        result.classList.add('visible');
      });

      currentRunSource.addEventListener('summary', e => {
        const text = JSON.parse(e.data);
        if (!synthText) { resultText.textContent = text; result.classList.add('visible'); }
      });

      currentRunSource.addEventListener('plan_approval', e => {
        const data = JSON.parse(JSON.parse(e.data));
        showApprovalSheet(data.goal, data.subtasks, currentRunId);
      });

      currentRunSource.addEventListener('done', e => {
        addProgress(progress, 'success', '✓ ' + JSON.parse(e.data));
        btn.disabled = false;
        currentRunSource.close();
      });

      currentRunSource.addEventListener('error', e => {
        btn.disabled = false;
        currentRunSource.close();
      });

    } catch(e) {
      addProgress(progress, 'error', '⚠️ Failed to start. Check Settings.');
      btn.disabled = false;
    }
  }

  function addProgress(el, type, text) {
    const line = document.createElement('div');
    line.className = 'prog-line prog-' + type;
    line.textContent = text;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  // ── Plan approval ─────────────────────────────────────────────────────────────
  function showApprovalSheet(goal, subtasks, runId) {
    runApprovalRunId = runId;
    document.getElementById('sheet-goal').textContent = goal;
    document.getElementById('sheet-tasks').innerHTML =
      subtasks.map(t => `<li>${esc(t)}</li>`).join('');
    document.getElementById('approval-sheet').classList.add('visible');
  }

  async function submitApproval(approved) {
    document.getElementById('approval-sheet').classList.remove('visible');
    if (!runApprovalRunId) return;
    await fetch(`/approve/${runApprovalRunId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ approved, subtasks: null }),
    });
    runApprovalRunId = null;
    const progress = document.getElementById('run-progress');
    addProgress(progress, approved ? 'success' : 'error',
      approved ? '✓ Plan approved — running…' : '✗ Cancelled');
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + TOKEN,
      },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path + (method === 'GET' ? `?token=${encodeURIComponent(TOKEN)}` : ''), opts);
    if (!res.ok) throw new Error(res.status);
    return res.json();
  }

  function esc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function now() {
    return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  // ── PWA service worker ────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
