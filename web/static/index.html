<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Ecosystem</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0f;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d3748;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.3rem; font-weight: 700; color: #63b3ed; }
    header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #68d391; margin-left: auto; }
    header .status-label { font-size: 0.75rem; color: #a0aec0; }

    .layout { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 57px); }

    /* Sidebar */
    .sidebar {
      background: #111118;
      border-right: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .goal-form { padding: 20px; border-bottom: 1px solid #2d3748; }
    .goal-form textarea {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #4a5568;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 10px 12px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    .goal-form textarea:focus { border-color: #63b3ed; }
    .goal-form button {
      margin-top: 10px;
      width: 100%;
      background: linear-gradient(135deg, #3182ce, #2b6cb0);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .goal-form button:hover { opacity: 0.9; }
    .goal-form button:disabled { opacity: 0.5; cursor: not-allowed; }

    .sidebar-tabs { display: flex; border-bottom: 1px solid #2d3748; }
    .sidebar-tabs button {
      flex: 1;
      background: none;
      border: none;
      color: #a0aec0;
      padding: 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.2s;
      border-bottom: 2px solid transparent;
    }
    .sidebar-tabs button.active { color: #63b3ed; border-bottom-color: #63b3ed; }

    .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 8px; }
    .tab-panel.active { display: block; }

    .run-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
      transition: all 0.15s;
    }
    .run-item:hover { background: #1a1a2e; border-color: #4a5568; }
    .run-item .run-goal { font-size: 0.83rem; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-item .run-meta { font-size: 0.7rem; color: #718096; margin-top: 3px; display: flex; gap: 8px; }
    .run-item .run-cost { color: #68d391; }

    .artifact-item {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
      transition: background 0.15s;
    }
    .artifact-item:hover { background: #1a1a2e; }
    .artifact-item .artifact-name { font-size: 0.8rem; color: #90cdf4; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .artifact-item .artifact-size { font-size: 0.7rem; color: #718096; margin-left: auto; flex-shrink: 0; }

    /* Main panel */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    .main-tabs { display: flex; background: #111118; border-bottom: 1px solid #2d3748; padding: 0 24px; gap: 4px; }
    .main-tabs button {
      background: none; border: none; color: #a0aec0;
      padding: 12px 16px; font-size: 0.85rem; cursor: pointer;
      border-bottom: 2px solid transparent; transition: color 0.2s;
    }
    .main-tabs button.active { color: #63b3ed; border-bottom-color: #63b3ed; }

    .main-content { flex: 1; overflow: hidden; position: relative; }
    .main-panel { display: none; height: 100%; overflow-y: auto; padding: 24px; }
    .main-panel.active { display: block; }

    /* Live feed */
    #feed { list-style: none; }
    #feed li {
      padding: 6px 12px;
      margin-bottom: 3px;
      border-radius: 4px;
      font-size: 0.83rem;
      font-family: monospace;
      line-height: 1.5;
    }
    .ev-orchestrator { color: #d6bcfa; background: rgba(159,122,234,0.08); }
    .ev-worker       { color: #90cdf4; background: rgba(66,153,225,0.08); }
    .ev-success      { color: #68d391; background: rgba(72,187,120,0.08); }
    .ev-error        { color: #fc8181; background: rgba(245,101,101,0.08); }
    .ev-warning      { color: #f6e05e; background: rgba(246,224,94,0.08); }
    .ev-start        { color: #fbd38d; background: rgba(237,137,54,0.08); }
    .ev-info         { color: #a0aec0; }
    .ev-summary      { color: #e2e8f0; background: #1a2744; border-left: 3px solid #63b3ed; padding: 12px; white-space: pre-wrap; font-family: inherit; font-size: 0.85rem; line-height: 1.6; }

    /* Code viewer */
    #code-viewer { background: #0f1117; border-radius: 8px; padding: 20px; }
    #code-viewer pre { font-family: monospace; font-size: 0.82rem; white-space: pre-wrap; word-break: break-word; color: #e2e8f0; line-height: 1.6; }
    #code-filename { font-size: 0.8rem; color: #63b3ed; margin-bottom: 12px; font-family: monospace; }

    /* Summary */
    #summary-view { background: #111827; border-radius: 8px; padding: 20px; line-height: 1.7; font-size: 0.88rem; white-space: pre-wrap; }

    /* Status */
    #status-view { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .status-card { background: #111827; border-radius: 10px; padding: 20px; border: 1px solid #2d3748; }
    .status-card h3 { font-size: 0.85rem; color: #a0aec0; margin-bottom: 8px; }
    .status-card .val { font-size: 1.4rem; font-weight: 700; }
    .ok { color: #68d391; } .err { color: #fc8181; } .warn { color: #f6e05e; }

    .empty { text-align: center; color: #718096; font-size: 0.85rem; padding: 40px 0; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Agent Ecosystem</h1>
  <span class="status-label" id="header-status">checking...</span>
  <span class="status-dot" id="status-dot" style="background:#718096"></span>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="goal-form">
      <textarea id="goal-input" placeholder="Enter a goal… e.g. build a SaaS billing system"></textarea>
      <button id="run-btn" onclick="submitGoal()">▶ Run Goal</button>
    </div>

    <div class="sidebar-tabs">
      <button class="active" onclick="switchSideTab('runs', this)">Runs</button>
      <button onclick="switchSideTab('artifacts', this)">Artifacts</button>
    </div>

    <div id="tab-runs" class="tab-panel active"></div>
    <div id="tab-artifacts" class="tab-panel"></div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-tabs">
      <button class="active" onclick="switchMainTab('live', this)">Live Feed</button>
      <button onclick="switchMainTab('summary', this)">Summary</button>
      <button onclick="switchMainTab('code', this)">File Viewer</button>
      <button onclick="switchMainTab('status', this)">Status</button>
      <button onclick="switchMainTab('analytics', this)">Analytics</button>
    </div>

    <div class="main-content">
      <div id="panel-live" class="main-panel active">
        <ul id="feed"><li class="empty">Submit a goal to watch agents work live.</li></ul>
      </div>

      <div id="panel-summary" class="main-panel">
        <div id="summary-view" class="empty">No summary yet.</div>
      </div>

      <div id="panel-code" class="main-panel">
        <div id="code-filename"></div>
        <div id="code-viewer"><pre>Select a file from the Artifacts tab.</pre></div>
      </div>

      <div id="panel-status" class="main-panel">
        <div id="status-view" class="empty">Loading…</div>
      </div>

      <div id="panel-analytics" class="main-panel">
        <div id="analytics-view" class="empty">Loading…</div>
      </div>
    </div>
  </main>

</div>

<script>
  let currentSource = null;

  // ── Tab switching ────────────────────────────────────────────────────────────
  function switchSideTab(name, btn) {
    document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  function switchMainTab(name, btn) {
    document.querySelectorAll('.main-tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
    if (name === 'status') loadStatus();
    if (name === 'analytics') loadAnalytics();
  }

  // ── Submit goal ──────────────────────────────────────────────────────────────
  async function submitGoal() {
    const goal = document.getElementById('goal-input').value.trim();
    if (!goal) return;

    document.getElementById('run-btn').disabled = true;
    document.getElementById('feed').innerHTML = '';
    document.getElementById('summary-view').textContent = '';
    addFeedItem('start', '🚀 Starting: ' + goal);

    const res = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal }),
    });
    const { run_id } = await res.json();

    if (currentSource) currentSource.close();
    currentSource = new EventSource('/stream/' + run_id);

    ['orchestrator','worker','success','error','warning','info','start'].forEach(ev => {
      currentSource.addEventListener(ev, e => addFeedItem(ev, JSON.parse(e.data)));
    });

    currentSource.addEventListener('summary', e => {
      const text = JSON.parse(e.data);
      document.getElementById('summary-view').textContent = text;
    });

    currentSource.addEventListener('done', e => {
      addFeedItem('success', '✓ ' + JSON.parse(e.data));
      document.getElementById('run-btn').disabled = false;
      currentSource.close();
      loadRuns();
      loadArtifacts();
    });

    currentSource.addEventListener('error', e => {
      document.getElementById('run-btn').disabled = false;
      currentSource.close();
    });
  }

  function addFeedItem(type, text) {
    const feed = document.getElementById('feed');
    const li = document.createElement('li');
    li.className = 'ev-' + type;
    li.textContent = text;
    feed.appendChild(li);
    li.scrollIntoView({ behavior: 'smooth' });
  }

  // ── Load runs ────────────────────────────────────────────────────────────────
  async function loadRuns() {
    const res = await fetch('/runs');
    const runs = await res.json();
    const el = document.getElementById('tab-runs');
    if (!runs.length) { el.innerHTML = '<p class="empty">No runs yet.</p>'; return; }
    el.innerHTML = runs.map(r => `
      <div class="run-item" onclick="showRun(${r.id})">
        <div class="run-goal">${r.goal}</div>
        <div class="run-meta">
          <span>${new Date(r.timestamp).toLocaleString()}</span>
          ${r.total_cost_usd ? `<span class="run-cost">$${r.total_cost_usd.toFixed(4)}</span>` : ''}
          ${r.duration_seconds ? `<span>${r.duration_seconds}s</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  async function showRun(id) {
    const res = await fetch('/runs/' + id);
    const run = await res.json();
    document.getElementById('summary-view').textContent = run.summary;
    switchMainTab('summary', document.querySelector('.main-tabs button:nth-child(2)'));
  }

  // ── Load artifacts ───────────────────────────────────────────────────────────
  async function loadArtifacts() {
    const res = await fetch('/artifacts');
    const files = await res.json();
    const el = document.getElementById('tab-artifacts');
    if (!files.length) { el.innerHTML = '<p class="empty">No artifacts yet.</p>'; return; }
    el.innerHTML = files.map(f => `
      <div class="artifact-item" onclick="viewArtifact('${f.path}')">
        <span class="artifact-name">${f.path}</span>
        <span class="artifact-size">${(f.size/1024).toFixed(1)}kb</span>
      </div>
    `).join('');
  }

  async function viewArtifact(path) {
    const res = await fetch('/artifacts/' + path);
    const data = await res.json();
    document.getElementById('code-filename').textContent = path;
    document.getElementById('code-viewer').innerHTML = '<pre>' + escapeHtml(data.content) + '</pre>';
    switchMainTab('code', document.querySelector('.main-tabs button:nth-child(3)'));
  }

  // ── Status ───────────────────────────────────────────────────────────────────
  async function loadStatus() {
    const res = await fetch('/status');
    const s = await res.json();
    const apiColor = s.api === 'ok' ? 'ok' : 'err';
    const ollamaColor = s.ollama === 'ok' ? 'ok' : 'warn';
    document.getElementById('status-view').innerHTML = `
      <div class="status-card">
        <h3>Anthropic API</h3>
        <div class="val ${apiColor}">${s.api.toUpperCase()}</div>
      </div>
      <div class="status-card">
        <h3>Ollama (Local LLMs)</h3>
        <div class="val ${ollamaColor}">${s.ollama.toUpperCase()}</div>
        ${s.ollama_models.length ? '<div style="margin-top:8px;font-size:0.75rem;color:#a0aec0">' + s.ollama_models.join('<br>') + '</div>' : ''}
      </div>
    `;
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('header-status');
    if (s.api === 'ok') {
      dot.style.background = '#68d391';
      label.textContent = s.ollama === 'ok' ? 'API + Local LLMs' : 'API only';
    } else {
      dot.style.background = '#fc8181';
      label.textContent = 'API offline';
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Keyboard shortcut ────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') submitGoal();
  });

  // ── Analytics ────────────────────────────────────────────────────────────────
  async function loadAnalytics() {
    const res = await fetch('/analytics');
    const a = await res.json();
    const modelRows = (a.model_performance || []).map(m =>
      `<tr><td style="padding:6px 12px;color:#e2e8f0">${m.model}</td><td style="padding:6px 12px;color:#68d391;text-align:right">${m.wins}</td><td style="padding:6px 12px;color:#fc8181;text-align:right">${m.fails}</td></tr>`
    ).join('');
    const costRows = (a.cost_last_7_days || []).map(d =>
      `<tr><td style="padding:6px 12px;color:#a0aec0">${d.day}</td><td style="padding:6px 12px;color:#68d391;text-align:right">$${(d.cost||0).toFixed(5)}</td></tr>`
    ).join('');
    document.getElementById('analytics-view').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px">
        <div class="status-card"><h3>Total Runs</h3><div class="val ok">${a.total_runs}</div></div>
        <div class="status-card"><h3>Total Cost</h3><div class="val" style="color:#f6ad55">$${(a.total_cost_usd||0).toFixed(4)}</div></div>
        <div class="status-card"><h3>Avg Duration</h3><div class="val" style="color:#63b3ed">${a.avg_duration_seconds}s</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="status-card">
          <h3 style="margin-bottom:12px">Model Performance</h3>
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="font-size:0.75rem;color:#718096"><th style="text-align:left;padding:4px 12px">Model</th><th style="text-align:right;padding:4px 12px">✓</th><th style="text-align:right;padding:4px 12px">✗</th></tr></thead>
            <tbody>${modelRows || '<tr><td colspan="3" style="text-align:center;color:#718096;padding:16px">No data yet</td></tr>'}</tbody>
          </table>
        </div>
        <div class="status-card">
          <h3 style="margin-bottom:12px">Cost (Last 7 Days)</h3>
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="font-size:0.75rem;color:#718096"><th style="text-align:left;padding:4px 12px">Date</th><th style="text-align:right;padding:4px 12px">Cost</th></tr></thead>
            <tbody>${costRows || '<tr><td colspan="2" style="text-align:center;color:#718096;padding:16px">No data yet</td></tr>'}</tbody>
          </table>
        </div>
      </div>
    `;
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  loadRuns();
  loadArtifacts();
  loadStatus();
  setInterval(loadStatus, 30000);
</script>
</body>
</html>
