<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MAP HQ — Architecture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }
    svg {
      width: 1100px;
      height: 820px;
      max-width: 100%;
    }
  </style>
</head>
<body>
<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f2a45"/>
    </linearGradient>
    <linearGradient id="orchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1a7a"/>
      <stop offset="100%" style="stop-color:#2d0f4a"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6a"/>
      <stop offset="100%" style="stop-color:#0f2545"/>
    </linearGradient>
    <linearGradient id="localGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a2a"/>
      <stop offset="100%" style="stop-color:#0f2d1a"/>
    </linearGradient>
    <linearGradient id="synthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3010"/>
      <stop offset="100%" style="stop-color:#2d1a08"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a4a"/>
      <stop offset="100%" style="stop-color:#0f0f2d"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a1a"/>
      <stop offset="100%" style="stop-color:#220f0f"/>
    </linearGradient>
    <linearGradient id="healGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a3a"/>
      <stop offset="100%" style="stop-color:#0f2222"/>
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff" opacity="0.8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#48bb78" opacity="0.8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b794f4" opacity="0.8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f6ad55" opacity="0.8"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fd1c5" opacity="0.8"/>
    </marker>

    <!-- Glow filters -->
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" font-family="'Segoe UI', sans-serif" letter-spacing="1">⚡ MAP HQ Architecture</text>
  <text x="550" y="56" text-anchor="middle" fill="#718096" font-size="11" font-family="monospace">Chloe  ·  Aria  ·  Nova  ·  Luna  ·  Maya</text>
  <line x1="200" y1="52" x2="900" y2="52" stroke="#2d3748" stroke-width="1"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- INPUT LAYER -->
  <!-- ════════════════════════════════════════════ -->
  <text x="550" y="82" text-anchor="middle" fill="#718096" font-size="11" font-family="monospace" letter-spacing="2">INPUT</text>

  <!-- CLI Box -->
  <rect x="180" y="90" width="160" height="56" rx="10" fill="url(#inputGrad)" stroke="#3182ce" stroke-width="1.5"/>
  <text x="260" y="115" text-anchor="middle" fill="#90cdf4" font-size="13" font-weight="600">CLI</text>
  <text x="260" y="132" text-anchor="middle" fill="#718096" font-size="10">scripts/launch.py</text>

  <!-- Web UI Box -->
  <rect x="760" y="90" width="160" height="56" rx="10" fill="url(#inputGrad)" stroke="#3182ce" stroke-width="1.5"/>
  <text x="840" y="115" text-anchor="middle" fill="#90cdf4" font-size="13" font-weight="600">Web Dashboard</text>
  <text x="840" y="132" text-anchor="middle" fill="#718096" font-size="10">web/app.py · :8000</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- ORCHESTRATOR -->
  <!-- ════════════════════════════════════════════ -->
  <!-- Arrow from CLI to Orchestrator -->
  <line x1="260" y1="146" x2="450" y2="186" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.7"/>
  <!-- Arrow from Web to Orchestrator -->
  <line x1="840" y1="146" x2="650" y2="186" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.7"/>

  <rect x="370" y="186" width="360" height="72" rx="12" fill="url(#orchGrad)" stroke="#9f7aea" stroke-width="2" filter="url(#glowPurple)"/>
  <text x="550" y="210" text-anchor="middle" fill="#e9d8fd" font-size="15" font-weight="700">🧠 Chloe</text>
  <text x="550" y="226" text-anchor="middle" fill="#b794f4" font-size="10" font-style="italic">OrchestratorAgent</text>
  <text x="550" y="242" text-anchor="middle" fill="#b794f4" font-size="11">Plans subtasks · Queries memory · Dispatches workers</text>
  <text x="550" y="256" text-anchor="middle" fill="#718096" font-size="10">Claude Haiku  ·  2 parallel workers  ·  max 8 subtasks</text>

  <!-- ════════════════════════════════════════════ -->

  <text x="110" y="231" text-anchor="middle" fill="#718096" font-size="10">SQLite · FTS search</text>
  <text x="110" y="247" text-anchor="middle" fill="#718096" font-size="10">Past runs · Patterns</text>
  <!-- Bidirectional arrow Orchestrator ↔ Memory -->
  <line x1="370" y1="222" x2="192" y2="222" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)" opacity="0.7"/>
  <line x1="192" y1="218" x2="370" y2="218" stroke="#667eea" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)" opacity="0.7"/>

  <!-- ════════════════════════════════════════════ -->

  <text x="140" y="347" text-anchor="middle" fill="#718096" font-size="9.5">Code · API · Tests</text>
  <text x="140" y="362" text-anchor="middle" fill="#4a6741" font-size="9">🏠 Local</text>

  <rect x="228" y="310" width="145" height="64" rx="8" fill="url(#localGrad)" stroke="#48bb78" stroke-width="1.5"/>
  <text x="300" y="331" text-anchor="middle" fill="#9ae6b4" font-size="11" font-weight="600">mistral:7b</text>
  <text x="300" y="347" text-anchor="middle" fill="#718096" font-size="9.5">Schema · DB · Config</text>
  <text x="300" y="362" text-anchor="middle" fill="#4a6741" font-size="9">🏠 Local</text>

  <!-- Worker 3 -->
  <rect x="388" y="310" width="145" height="64" rx="8" fill="url(#localGrad)" stroke="#48bb78" stroke-width="1.5"/>
  <text x="460" y="331" text-anchor="middle" fill="#9ae6b4" font-size="11" font-weight="600">llama3.1:8b</text>
  <text x="460" y="347" text-anchor="middle" fill="#718096" font-size="9.5">Design · Writing</text>

  <text x="620" y="362" text-anchor="middle" fill="#4a6741" font-size="9">🏠 Local</text>

  <rect x="708" y="310" width="145" height="64" rx="8" fill="url(#localGrad)" stroke="#48bb78" stroke-width="1.5"/>
  <text x="780" y="331" text-anchor="middle" fill="#9ae6b4" font-size="11" font-weight="600">gemma2:9b</text>
  <text x="780" y="347" text-anchor="middle" fill="#718096" font-size="9.5">Analysis · Research</text>
  <text x="780" y="362" text-anchor="middle" fill="#4a6741" font-size="9">🏠 Local</text>

  <!-- Worker 6 — Haiku fallback -->
  <rect x="868" y="310" width="165" height="64" rx="8" fill="url(#workerGrad)" stroke="#63b3ed" stroke-width="1.5"/>
  <text x="950" y="331" text-anchor="middle" fill="#90cdf4" font-size="11" font-weight="600">claude-haiku-4-5</text>
  <text x="950" y="347" text-anchor="middle" fill="#718096" font-size="9.5">Fallback · Simple</text>

  <!-- ~80% free label -->
  <text x="460" y="400" text-anchor="middle" fill="#48bb78" font-size="10" font-weight="600">~80% free  (local)</text>
  <text x="900" y="400" text-anchor="middle" fill="#63b3ed" font-size="10">~20% API</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- TOOLS ROW -->
  <!-- ════════════════════════════════════════════ -->
  <text x="550" y="428" text-anchor="middle" fill="#718096" font-size="11" font-family="monospace" letter-spacing="2">WORKER TOOLS</text>

  <!-- Arrow Workers → Tools -->
  <line x1="550" y1="408" x2="550" y2="435" stroke="#fc8181" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowOrange)" opacity="0.6"/>

  <rect x="50" y="438" width="1000" height="60" rx="10" fill="url(#toolGrad)" stroke="#fc8181" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Tool pills -->
  <rect x="80" y="452" width="110" height="28" rx="14" fill="#2d1515" stroke="#fc8181" stroke-width="1"/>
  <text x="135" y="470" text-anchor="middle" fill="#feb2b2" font-size="11">📁 write_file</text>

  <rect x="205" y="452" width="110" height="28" rx="14" fill="#2d1515" stroke="#fc8181" stroke-width="1"/>
  <text x="260" y="470" text-anchor="middle" fill="#feb2b2" font-size="11">📖 read_file</text>

  <rect x="330" y="452" width="120" height="28" rx="14" fill="#2d1515" stroke="#fc8181" stroke-width="1"/>
  <text x="390" y="470" text-anchor="middle" fill="#feb2b2" font-size="11">🔍 web_search</text>

  <text x="820" y="467" text-anchor="middle" fill="#718096" font-size="9.5">DuckDuckGo · No key</text>
  <text x="950" y="460" text-anchor="middle" fill="#718096" font-size="9.5">Security · Arch</text>
  <text x="950" y="473" text-anchor="middle" fill="#718096" font-size="9.5">DB · DevOps · etc.</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- AGENT BUS -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="870" y="520" width="200" height="64" rx="10" fill="#1a2035" stroke="#4fd1c5" stroke-width="1.5"/>
  <text x="970" y="546" text-anchor="middle" fill="#81e6d9" font-size="13" font-weight="600">🔗 Agent Bus</text>
  <text x="970" y="562" text-anchor="middle" fill="#718096" font-size="10">utils/bus.py</text>
  <text x="970" y="576" text-anchor="middle" fill="#718096" font-size="10">A2A · Cached responses</text>
  <!-- ask_specialist → bus -->
  <line x1="740" y1="466" x2="870" y2="552" stroke="#4fd1c5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowTeal)" opacity="0.7"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- SYNTHESISER -->
  <!-- ════════════════════════════════════════════ -->
  <!-- Arrow Workers → Synthesiser -->
  <line x1="550" y1="500" x2="550" y2="530" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow)" opacity="0.8"/>

  <rect x="330" y="530" width="440" height="72" rx="12" fill="url(#synthGrad)" stroke="#f6ad55" stroke-width="2" filter="url(#glowGreen)"/>
  <text x="550" y="554" text-anchor="middle" fill="#fefcbf" font-size="15" font-weight="700">✨ Aria</text>
  <text x="550" y="570" text-anchor="middle" fill="#f6ad55" font-size="10" font-style="italic">SynthesiserAgent</text>
  <text x="550" y="584" text-anchor="middle" fill="#f6ad55" font-size="11">Streams final output · Combines all worker results</text>
  <text x="550" y="598" text-anchor="middle" fill="#718096" font-size="10">Claude Sonnet 4.6  ·  4096 tokens  ·  Prompt caching</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- BOTTOM ROW: Storage + Monitor + Batch -->
  <!-- ════════════════════════════════════════════ -->
  <!-- Arrow Synth → Output -->
  <line x1="550" y1="602" x2="550" y2="632" stroke="#48bb78" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.8"/>

  <!-- Storage -->
  <rect x="120" y="634" width="200" height="68" rx="10" fill="#0f1a2a" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="220" y="658" text-anchor="middle" fill="#90cdf4" font-size="13" font-weight="600">💾 Storage</text>

  <text x="220" y="688" text-anchor="middle" fill="#718096" font-size="10">All artifacts written by workers</text>

  <!-- Final Output -->
  <rect x="400" y="634" width="300" height="68" rx="10" fill="#0f1f0f" stroke="#48bb78" stroke-width="2"/>
  <text x="550" y="660" text-anchor="middle" fill="#9ae6b4" font-size="14" font-weight="700">📤 Final Output</text>
  <text x="550" y="678" text-anchor="middle" fill="#718096" font-size="10">Streamed to CLI  ·  Live in Web UI</text>
  <text x="550" y="693" text-anchor="middle" fill="#718096" font-size="10">Saved to memory.db + runs/*.json</text>

  <rect x="780" y="634" width="200" height="68" rx="10" fill="url(#healGrad)" stroke="#4fd1c5" stroke-width="1.5"/>
  <text x="880" y="658" text-anchor="middle" fill="#81e6d9" font-size="13" font-weight="600">🛡 Monitor / Heal</text>
  <text x="880" y="674" text-anchor="middle" fill="#718096" font-size="10">Daily health check · Auto-retry</text>
  <text x="880" y="688" text-anchor="middle" fill="#718096" font-size="10">Failure alerts · logs/heal.log</text>

  <!-- Arrows to bottom row -->
  <line x1="450" y1="602" x2="280" y2="634" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="650" y1="602" x2="820" y2="634" stroke="#4fd1c5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowTeal)" opacity="0.6"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="50" y="728" width="1000" height="70" rx="10" fill="#0d0d1a" stroke="#2d3748" stroke-width="1"/>
  <text x="550" y="748" text-anchor="middle" fill="#718096" font-size="11" font-family="monospace" letter-spacing="2">LEGEND</text>

  <rect x="80" y="757" width="12" height="12" rx="2" fill="#48bb78"/>
  <text x="100" y="768" fill="#718096" font-size="10">Local Ollama (free)</text>
  <rect x="220" y="757" width="12" height="12" rx="2" fill="#63b3ed"/>
  <text x="240" y="768" fill="#718096" font-size="10">Anthropic API</text>
  <rect x="360" y="757" width="12" height="12" rx="2" fill="#9f7aea"/>
  <text x="380" y="768" fill="#718096" font-size="10">Planning / Synthesis</text>
  <rect x="530" y="757" width="12" height="12" rx="2" fill="#fc8181"/>
  <text x="550" y="768" fill="#718096" font-size="10">Tools</text>
  <rect x="620" y="757" width="12" height="12" rx="2" fill="#4fd1c5"/>
  <text x="640" y="768" fill="#718096" font-size="10">A2A Bus</text>
  <rect x="730" y="757" width="12" height="12" rx="2" fill="#667eea"/>
  <text x="750" y="768" fill="#718096" font-size="10">Memory (SQLite)</text>
  <text x="900" y="768" fill="#4a5568" font-size="10" font-family="monospace">Python 3.9 · Anthropic SDK · Ollama · FastAPI</text>

  <!-- Prompt caching badge -->
  <rect x="850" y="522" width="130" height="22" rx="11" fill="#1a2040" stroke="#667eea" stroke-width="1"/>
  <text x="915" y="537" text-anchor="middle" fill="#a3bffa" font-size="10">⚡ Prompt Caching</text>

  <rect x="30" y="616" width="160" height="40" rx="8" fill="#1a1010" stroke="#744210" stroke-width="1"/>
